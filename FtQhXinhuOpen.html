<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>打开新湖期货</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #242837;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: #242837 url("assets/singleSite.png") center / cover no-repeat;
            color: #fff;
        }

        #go {
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;
            padding: max(32px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom));
            border: 0;
            outline: 0;
            background: transparent;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            touch-action: manipulation;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .title {
            box-sizing: border-box;
            min-width: min(76vw, 320px);
            min-height: 54px;
            padding: 0 24px;
            border-radius: 8px;
            background: linear-gradient(90deg, #4875ff 0%, #5868ff 100%);
            box-shadow: 0 16px 36px rgba(38, 101, 246, 0.38);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            line-height: 1.25;
            font-weight: 600;
            text-align: center;
            transform: translateY(-16vh);
        }

        #go:active .title {
            background: linear-gradient(90deg, #3c68ed 0%, #4c5dec 100%);
            transform: translateY(calc(-16vh + 1px));
        }

        .status {
            min-height: 22px;
            font-size: 15px;
            line-height: 1.45;
            color: rgba(255, 255, 255, 0.72);
        }
    </style>
</head>
<body>
    <a id="go" href="https://shuyangxiaobao.github.io/connect/FtQhXinhu.html">
        <span class="title">打开新湖期货</span>
        <span class="status" id="status"></span>
    </a>

    <script>
        const qdaiSiteNames = {
          "FtQhDongzheng": "东证期货筋斗云",
          "FtQhXinhu": "新湖期货筋斗云",
          "FtQhYinhe": "银河期货筋斗云",
          "FtQhZhongxinjiantou": "中信建投筋斗云"
};
        const qdaiSiteCid = qdaiResolveSiteCid();
        const qdaiSiteName = qdaiSiteNames[qdaiSiteCid] || "筋斗云";
        // 当前测试环境部署在 GitHub Pages，Universal Link 也使用 shuyangxiaobao.github.io。
        const qdaiUniversalLinkUrl = "https://shuyangxiaobao.github.io/connect/" + qdaiSiteCid + ".html";
        const qdaiAppStoreUrl = "https://apps.apple.com/app/id1587648528";
        const qdaiAndroidSchemeUrl = "quantdo://instrumentlist:8081/Flexitrader";
        const qdaiAndroidDownloadUrl = "https://flexitrader.quantdo.com.cn/download";

        let qdaiIsOpening = false;
        let qdaiAndroidFallbackTimer = null;
        let qdaiAndroidOpening = false;

        function qdaiResolveSiteCid() {
            const fileName = window.location.pathname.split("/").pop() || "FtQhDongzhengOpen.html";
            const siteCid = fileName.replace(/Open\.html$/, "").replace(/\.html$/, "");
            return qdaiSiteNames[siteCid] ? siteCid : "FtQhDongzheng";
        }

        function qdaiIsIOS() {
            return /iPhone|iPad|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        }

        function qdaiIsAndroid() {
            return /Android/i.test(navigator.userAgent);
        }

        function qdaiSetStatus(text) {
            document.getElementById("status").innerText = text;
        }

        function qdaiCopyTextSync(text) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.setAttribute("readonly", "readonly");
            textarea.style.position = "fixed";
            textarea.style.left = "0";
            textarea.style.top = "0";
            textarea.style.width = "1px";
            textarea.style.height = "1px";
            textarea.style.opacity = "0";
            textarea.style.fontSize = "16px";
            textarea.style.pointerEvents = "none";
            document.body.appendChild(textarea);

            const selection = window.getSelection ? window.getSelection() : null;
            const oldRange = selection && selection.rangeCount > 0 ? selection.getRangeAt(0) : null;
            let success = false;

            try {
                textarea.focus();
                textarea.select();
                textarea.setSelectionRange(0, textarea.value.length);

                if (/iPhone|iPad|iPod/.test(navigator.userAgent) && selection) {
                    const range = document.createRange();
                    range.selectNodeContents(textarea);
                    selection.removeAllRanges();
                    selection.addRange(range);
                    textarea.setSelectionRange(0, textarea.value.length);
                }

                success = document.execCommand("copy");
            } catch (e) {
                success = false;
            }

            document.body.removeChild(textarea);
            if (selection) {
                selection.removeAllRanges();
                if (oldRange) {
                    selection.addRange(oldRange);
                }
            }

            return success;
        }

        function qdaiJumpToAppStore() {
            qdaiIsOpening = false;
            window.location.href = qdaiAppStoreUrl;
        }

        function qdaiOpenAndroidAppOrDownload() {
            if (qdaiAndroidFallbackTimer) {
                clearTimeout(qdaiAndroidFallbackTimer);
            }

            qdaiAndroidOpening = true;
            qdaiAndroidFallbackTimer = setTimeout(function () {
                if (!document.hidden && document.visibilityState !== "hidden") {
                    window.location.href = qdaiAndroidDownloadUrl;
                }
                qdaiAndroidFallbackTimer = null;
                qdaiAndroidOpening = false;
                qdaiIsOpening = false;
            }, 3500);

            window.location.href = qdaiAndroidSchemeUrl;
        }

        function qdaiCancelAndroidFallbackIfNeeded() {
            if (!qdaiAndroidFallbackTimer && !qdaiAndroidOpening) {
                return;
            }
            if (qdaiAndroidFallbackTimer) {
                clearTimeout(qdaiAndroidFallbackTimer);
            }
            qdaiAndroidFallbackTimer = null;
            qdaiAndroidOpening = false;
            qdaiIsOpening = false;
        }

        function qdaiOpenAfterCopy() {
            if (qdaiIsAndroid()) {
                qdaiOpenAndroidAppOrDownload();
                return;
            }
            qdaiJumpToAppStore();
        }

        function qdaiOpenAppOrStore(event) {
            if (qdaiIsOpening) {
                if (event) {
                    event.preventDefault();
                }
                return;
            }
            qdaiIsOpening = true;
            document.getElementById("go").querySelector(".title").innerText = "正在打开" + qdaiSiteName + "...";
            qdaiSetStatus("");

            if (qdaiIsIOS()) {
                qdaiCopyTextSync(qdaiSiteCid);
                return;
            }

            if (event) {
                event.preventDefault();
            }

            if (qdaiCopyTextSync(qdaiSiteCid)) {
                qdaiOpenAfterCopy();
                return;
            }

            if (!navigator.clipboard || !window.isSecureContext) {
                qdaiOpenAfterCopy();
                return;
            }

            navigator.clipboard.writeText(qdaiSiteCid).then(function () {
                qdaiOpenAfterCopy();
            }).catch(function () {
                qdaiOpenAfterCopy();
            });
        }

        document.title = "打开" + qdaiSiteName;
        document.getElementById("go").href = qdaiUniversalLinkUrl;
        document.getElementById("go").querySelector(".title").innerText = "打开" + qdaiSiteName;
        document.getElementById("go").addEventListener("click", qdaiOpenAppOrStore);

        document.addEventListener("visibilitychange", function () {
            if (document.hidden && qdaiAndroidFallbackTimer) {
                qdaiCancelAndroidFallbackIfNeeded();
            }
        });

        window.addEventListener("pagehide", function () {
            qdaiCancelAndroidFallbackIfNeeded();
        });

        window.addEventListener("blur", function () {
            if (qdaiAndroidOpening) {
                qdaiCancelAndroidFallbackIfNeeded();
            }
        });
    </script>
</body>
</html>
