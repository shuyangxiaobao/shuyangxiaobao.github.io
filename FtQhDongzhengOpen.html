<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>打开筋斗云</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #go {
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;
            padding: max(32px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom));
            border: 0;
            outline: 0;
            background: #007aff;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            touch-action: manipulation;
        }

        #go:active {
            background: #0068d8;
        }

        .title {
            font-size: 22px;
            line-height: 1.25;
            font-weight: 600;
        }

        .status {
            min-height: 22px;
            font-size: 15px;
            line-height: 1.45;
            opacity: 0.88;
        }
    </style>
</head>
<body>
    <button id="go" type="button">
        <span class="title">打开筋斗云</span>
        <span class="status" id="status"></span>
    </button>

    <script>
        const qdaiSiteCid = "FtQhDongzheng";
        // GitHub Pages 入口页使用 shuyangxiaobao.github.io，点击后跳到 flexitrader.quantdo.com.cn 的 Universal Link，避免 iOS Safari 同域跳转留在浏览器。
        const qdaiUniversalLinkUrl = "https://flexitrader.quantdo.com.cn/connect/" + qdaiSiteCid + ".html";
        const qdaiAppStoreUrl = "https://apps.apple.com/app/id1587648528";
        const qdaiAndroidSchemeUrl = "quantdo://instrumentlist:8081/Flexitrader";
        const qdaiAndroidDownloadUrl = "https://flexitrader.quantdo.com.cn/download";

        let qdaiIsOpening = false;
        let qdaiAndroidFallbackTimer = null;
        let qdaiAndroidOpening = false;

        function qdaiIsIOS() {
            return /iPhone|iPad|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        }

        function qdaiIsAndroid() {
            return /Android/i.test(navigator.userAgent);
        }

        function qdaiSetStatus(text) {
            document.getElementById("status").innerText = text;
        }

        function qdaiCopyTextSync(text) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.setAttribute("readonly", "readonly");
            textarea.style.position = "fixed";
            textarea.style.left = "0";
            textarea.style.top = "0";
            textarea.style.width = "1px";
            textarea.style.height = "1px";
            textarea.style.opacity = "0";
            textarea.style.fontSize = "16px";
            textarea.style.pointerEvents = "none";
            document.body.appendChild(textarea);

            const selection = window.getSelection ? window.getSelection() : null;
            const oldRange = selection && selection.rangeCount > 0 ? selection.getRangeAt(0) : null;
            let success = false;

            try {
                textarea.focus();
                textarea.select();
                textarea.setSelectionRange(0, textarea.value.length);

                if (/iPhone|iPad|iPod/.test(navigator.userAgent) && selection) {
                    const range = document.createRange();
                    range.selectNodeContents(textarea);
                    selection.removeAllRanges();
                    selection.addRange(range);
                    textarea.setSelectionRange(0, textarea.value.length);
                }

                success = document.execCommand("copy");
            } catch (e) {
                success = false;
            }

            document.body.removeChild(textarea);
            if (selection) {
                selection.removeAllRanges();
                if (oldRange) {
                    selection.addRange(oldRange);
                }
            }

            return success;
        }

        function qdaiJumpToAppStore() {
            qdaiIsOpening = false;
            window.location.href = qdaiAppStoreUrl;
        }

        function qdaiOpenAndroidAppOrDownload() {
            if (qdaiAndroidFallbackTimer) {
                clearTimeout(qdaiAndroidFallbackTimer);
            }

            qdaiAndroidOpening = true;
            qdaiAndroidFallbackTimer = setTimeout(function () {
                if (!document.hidden && document.visibilityState !== "hidden") {
                    window.location.href = qdaiAndroidDownloadUrl;
                }
                qdaiAndroidFallbackTimer = null;
                qdaiAndroidOpening = false;
                qdaiIsOpening = false;
            }, 3500);

            window.location.href = qdaiAndroidSchemeUrl;
        }

        function qdaiCancelAndroidFallbackIfNeeded() {
            if (!qdaiAndroidFallbackTimer && !qdaiAndroidOpening) {
                return;
            }
            if (qdaiAndroidFallbackTimer) {
                clearTimeout(qdaiAndroidFallbackTimer);
            }
            qdaiAndroidFallbackTimer = null;
            qdaiAndroidOpening = false;
            qdaiIsOpening = false;
        }

        function qdaiOpenAfterCopy() {
            if (qdaiIsAndroid()) {
                qdaiOpenAndroidAppOrDownload();
                return;
            }
            if (qdaiIsIOS()) {
                window.location.href = qdaiUniversalLinkUrl;
                return;
            }
            qdaiJumpToAppStore();
        }

        function qdaiOpenAppOrStore() {
            if (qdaiIsOpening) {
                return;
            }
            qdaiIsOpening = true;
            document.getElementById("go").querySelector(".title").innerText = "正在打开...";
            qdaiSetStatus("");

            if (qdaiCopyTextSync(qdaiSiteCid)) {
                qdaiOpenAfterCopy();
                return;
            }

            if (!navigator.clipboard || !window.isSecureContext) {
                qdaiOpenAfterCopy();
                return;
            }

            navigator.clipboard.writeText(qdaiSiteCid).then(function () {
                qdaiOpenAfterCopy();
            }).catch(function () {
                qdaiOpenAfterCopy();
            });
        }

        document.getElementById("go").addEventListener("click", qdaiOpenAppOrStore);

        document.addEventListener("visibilitychange", function () {
            if (document.hidden && qdaiAndroidFallbackTimer) {
                qdaiCancelAndroidFallbackIfNeeded();
            }
        });

        window.addEventListener("pagehide", function () {
            qdaiCancelAndroidFallbackIfNeeded();
        });

        window.addEventListener("blur", function () {
            if (qdaiAndroidOpening) {
                qdaiCancelAndroidFallbackIfNeeded();
            }
        });
    </script>
</body>
</html>
