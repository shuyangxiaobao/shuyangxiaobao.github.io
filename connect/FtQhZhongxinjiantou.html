<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>跳转</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #242837;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: #242837 url("../assets/singleSite.png") center / cover no-repeat;
            color: #fff;
        }

        #go {
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;
            padding: max(32px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom));
            border: 0;
            outline: 0;
            background: transparent;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            touch-action: manipulation;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .title {
            box-sizing: border-box;
            min-width: min(76vw, 320px);
            min-height: 54px;
            padding: 0 24px;
            border-radius: 8px;
            background: linear-gradient(90deg, #4875ff 0%, #5868ff 100%);
            box-shadow: 0 16px 36px rgba(38, 101, 246, 0.38);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            line-height: 1.25;
            font-weight: 600;
            text-align: center;
            transform: translateY(-16vh);
        }

        #go:active .title {
            background: linear-gradient(90deg, #3c68ed 0%, #4c5dec 100%);
            transform: translateY(calc(-16vh + 1px));
        }

        .status {
            min-height: 22px;
            font-size: 15px;
            line-height: 1.45;
            color: rgba(255, 255, 255, 0.72);
        }
    </style>
</head>
<body>
    <button id="go"><span class="title">打开筋斗云</span></button>

    <script>
        const qdaiSiteNames = {
          "FtQhDongzheng": "东证期货筋斗云",
          "FtQhXinhu": "新湖期货筋斗云",
          "FtQhYinhe": "银河期货筋斗云",
          "FtQhZhongxinjiantou": "中信建投筋斗云"
};
        const qdaiSiteCid = qdaiResolveSiteCid();
        const qdaiSiteName = qdaiSiteNames[qdaiSiteCid] || "筋斗云";
        const qdaiUniversalLinkHost = qdaiResolveUniversalLinkHost();
        const qdaiUniversalLinkPath = "/connect/" + qdaiSiteCid + ".html";
        const qdaiUniversalLinkUrl = "https://" + qdaiUniversalLinkHost + qdaiUniversalLinkPath;
        const qdaiAppStoreUrl = "https://apps.apple.com/app/id1587648528";
        const qdaiAndroidSchemeUrl = "quantdo://instrumentlist:8081/Flexitrader";
        const qdaiAndroidDownloadUrl = "https://flexitrader.quantdo.com.cn/download";
        let qdaiIsOpening = false;
        let qdaiAndroidFallbackTimer = null;
        let qdaiAndroidOpening = false;

        function qdaiResolveSiteCid() {
            const fileName = window.location.pathname.split("/").pop() || "FtQhDongzheng.html";
            const match = fileName.match(/^(FtQh[A-Za-z]+).html$/);
            return match && qdaiSiteNames[match[1]] ? match[1] : "FtQhDongzheng";
        }

        function qdaiResolveUniversalLinkHost() {
            if (window.location.hostname === "shuyangxiaobao.github.io" || window.location.hostname === "flexitrader.quantdo.com.cn") {
                return window.location.hostname;
            }
            return "flexitrader.quantdo.com.cn";
        }

        function copyText(text) {
            return new Promise((resolve, reject) => {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(resolve).catch(() => {
                        copyTextSync(text) ? resolve() : reject();
                    });
                } else {
                    copyTextSync(text) ? resolve() : reject();
                }
            });
        }

        function copyTextSync(text) {
            let input = document.createElement('input');
            input.value = text;
            input.style.position = 'fixed';
            input.style.left = '-9999px';
            input.style.top = '-9999px';
            document.body.appendChild(input);
            input.focus();
            input.select();
            input.setSelectionRange(0, input.value.length);
            let suc = false;
            try {
                suc = document.execCommand('copy');
            } catch (e) {
                suc = false;
            }
            document.body.removeChild(input);
            return suc;
        }

        function qdaiIsIOS() {
            return /iPhone|iPad|iPod/.test(navigator.userAgent);
        }

        function qdaiIsAndroid() {
            return /Android/i.test(navigator.userAgent);
        }

        function qdaiIsUniversalLinkPage() {
            return window.location.hostname === qdaiUniversalLinkHost && window.location.pathname === qdaiUniversalLinkPath;
        }

        function qdaiJumpToAppStore() {
            window.location.href = qdaiAppStoreUrl;
            qdaiIsOpening = false;
        }

        function qdaiJumpToUniversalLink() {
            window.location.href = qdaiUniversalLinkUrl;
        }

        function qdaiOpenAndroidAppOrDownload() {
            if (qdaiAndroidFallbackTimer) {
                clearTimeout(qdaiAndroidFallbackTimer);
                qdaiAndroidFallbackTimer = null;
            }
            qdaiAndroidOpening = true;
            qdaiAndroidFallbackTimer = setTimeout(function () {
                if (!document.hidden && document.visibilityState !== "hidden") {
                    window.location.href = qdaiAndroidDownloadUrl;
                }
                qdaiAndroidFallbackTimer = null;
                qdaiAndroidOpening = false;
                qdaiIsOpening = false;
            }, 3500);
            window.location.href = qdaiAndroidSchemeUrl;
        }

        function qdaiCancelAndroidFallbackIfNeeded() {
            if (!qdaiAndroidFallbackTimer && !qdaiAndroidOpening) {
                return;
            }
            if (qdaiAndroidFallbackTimer) {
                clearTimeout(qdaiAndroidFallbackTimer);
            }
            qdaiAndroidFallbackTimer = null;
            qdaiAndroidOpening = false;
            qdaiIsOpening = false;
        }

        function qdaiOpenAfterCopy() {
            if (qdaiIsAndroid()) {
                qdaiOpenAndroidAppOrDownload();
                return;
            }
            if (qdaiIsIOS() && !qdaiIsUniversalLinkPage()) {
                qdaiJumpToUniversalLink();
                return;
            }
            qdaiJumpToAppStore();
        }

        function qdaiOpenAppOrStore() {
            if (qdaiIsOpening) {
                return;
            }
            qdaiIsOpening = true;
            document.getElementById('go').querySelector('.title').innerText = "正在打开" + qdaiSiteName + "...";

            if (qdaiIsAndroid()) {
                if (copyTextSync(qdaiSiteCid)) {
                    qdaiOpenAfterCopy();
                } else {
                    console.log("复制失败，但继续跳转");
                    qdaiOpenAfterCopy();
                }
                return;
            }

            if (qdaiIsIOS() && copyTextSync(qdaiSiteCid)) {
                console.log("复制成功");
                qdaiOpenAfterCopy();
                return;
            }

            copyText(qdaiSiteCid).then(() => {
                console.log("复制成功");
                qdaiOpenAfterCopy();
            }).catch(() => {
                console.log("复制失败，但继续跳转");
                qdaiOpenAfterCopy();
            });
        }

        document.title = "打开" + qdaiSiteName;
        document.getElementById('go').querySelector('.title').innerText = "打开" + qdaiSiteName;

        window.addEventListener('load', function () {
            if (qdaiIsIOS() && qdaiIsUniversalLinkPage()) {
                setTimeout(qdaiJumpToAppStore, 600);
            }
        });

        document.addEventListener('visibilitychange', function () {
            if (document.hidden && qdaiAndroidFallbackTimer) {
                qdaiCancelAndroidFallbackIfNeeded();
            }
        });

        window.addEventListener('pagehide', function () {
            qdaiCancelAndroidFallbackIfNeeded();
        });

        window.addEventListener('blur', function () {
            if (qdaiAndroidOpening) {
                qdaiCancelAndroidFallbackIfNeeded();
            }
        });

        document.body.onclick = qdaiOpenAppOrStore;
    </script>
</body>
</html>
